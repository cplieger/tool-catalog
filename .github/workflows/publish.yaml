# Catalog publish: compile the PINNED mise + aqua registry refs
# (registries.env) into tool-catalog.json and cut a dated release. The
# heavy lifting (pin validation, fetch-by-commit, compile, verify,
# skip-if-unchanged, release) lives in scripts/publish.sh so it runs
# identically in CI and locally (DRY_RUN=1). Consumers fetch
# releases/latest/download/tool-catalog.json.
#
# Trigger model: Renovate bumps registries.env (and the lane pin below),
# the automerged PR lands on main, and the push trigger publishes — a
# release follows every upstream registry update at the Renovate sweep
# cadence. Merges touching publish.sh or required-floor.txt also run:
# a floor change re-publishes (the floor digest is part of the
# idempotence stamp, so the new floor is verified on merge, not at the
# next pin bump); a script-only change exercises the script and no-ops
# at the stamp. The daily cron is a SELF-HEAL retry only: publish.sh's
# idempotence stamp makes it a no-op while the newest release already
# matches the pins, and it re-publishes exactly when a push-triggered
# run failed mid-flight (GitHub outage, transient fetch failure).
name: Publish

on:
  push:
    branches: [main]
    paths:
      - registries.env
      - .github/workflows/publish.yaml
      - scripts/publish.sh
      - required-floor.txt
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # gh release create (tag + assets)
      actions: write # workflow self-keepalive (see the step below)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No step pushes with checkout-persisted credentials (gh uses
          # the GH_TOKEN env); do not leave the token in .git/config.
          persist-credentials: false
      # Keepalive: GitHub disables scheduled workflows after 60 days
      # without repository activity, and cron runs themselves do not
      # count as activity. Renovate's registry-pin bumps normally keep
      # the repo active, but if both upstreams (or Renovate itself)
      # went quiet for 60 days the self-heal cron would die silently,
      # so every run re-enables the workflow to reset the inactivity
      # clock (the standard keepalive pattern). Silent publisher death
      # is the failure mode consumers cannot see: they would keep
      # fetching an aging catalog forever.
      - name: Keepalive (reset the 60-day scheduled-workflow timer)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${GITHUB_REPOSITORY}/actions/workflows/publish.yaml/enable"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "stable"
          cache: false # nothing to key a module cache on (no go.mod here)
      - name: Compile and publish
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=go depName=github.com/cplieger/toolbelt/v2
          TOOLCATALOG_VERSION: v2.2.2
        run: bash scripts/publish.sh
